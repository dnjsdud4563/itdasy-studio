<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>인스타그램 연동 중...</title>
  <style>
    body {
      background: #0f0608;
      color: #f2e8ea;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(241,128,145,0.3);
      border-top-color: #f18091;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 16px; font-weight: 600; margin: 0 0 8px; color: #f18091; }
    p { font-size: 13px; color: #aaa; margin: 0; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <h2>인스타그램 로그인 페이지로 이동 중...</h2>
  <p>잠시만 기다려주세요.</p>

  <script>
    // URI에서 auth_url 파라미터 추출 후 즉시 이동
    // meta redirect를 JS보다 먼저 실행하면 iOS Universal Link를 우회할 수 있습니다
    (function() {
      const params = new URLSearchParams(window.location.search);
      const authUrl = params.get('auth_url');
      if (!authUrl) {
        document.querySelector('h2').textContent = '오류: 인증 주소가 없습니다.';
        document.querySelector('p').textContent = '앱으로 돌아가서 다시 시도해주세요.';
        return;
      }
      // 디코딩된 URL로 이동 (meta redirect 방식: iOS 앱 딥링크 차단 우회)
      const decoded = decodeURIComponent(authUrl);
      // 즉시 location.replace 사용 (history에 bridge 페이지 안 남김)
      window.location.replace(decoded);
    })();
  </script>
</body>
</html>
